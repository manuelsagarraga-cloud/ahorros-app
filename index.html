<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Finanzas · Manu & Flor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f0f0e; --surface:#1a1a18; --surface2:#222220;
    --border:rgba(255,255,255,0.07); --text:#f0ede6; --muted:#8a8880;
    --green:#7ecba1; --green-dim:rgba(126,203,161,0.12);
    --blue:#7eb3cb; --blue-dim:rgba(126,179,203,0.12);
    --amber:#cbab7e; --amber-dim:rgba(203,171,126,0.12);
    --pink:#cb7e9f; --pink-dim:rgba(203,126,159,0.12);
    --brown:#b89a7a; --brown-dim:rgba(184,154,122,0.12);
    --red:#cb7e7e; --red-dim:rgba(203,126,126,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:110px;}

  /* HEADER */
  .header{padding:48px 24px 20px;border-bottom:1px solid var(--border);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .header h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;line-height:1.1;}
  .header h1 em{font-style:italic;color:var(--green);}
  .sync-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;white-space:nowrap;}
  .sync-btn:hover{border-color:var(--green);color:var(--green);}
  .sync-btn.loading .spin{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .subtitle{font-size:12px;color:var(--muted);}

  /* PERSONA TOGGLE */
  .persona-toggle{display:flex;background:var(--surface2);border-radius:24px;padding:3px;gap:2px;}
  .persona-btn{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
  .persona-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.4);}
  .persona-btn.manuel.active{color:var(--blue);}
  .persona-btn.flor.active{color:var(--pink);}

  /* SALDO NETO */
  .saldo-card{margin:16px 24px 0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;}
  .saldo-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;}
  .saldo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .saldo-pill{background:var(--surface2);border-radius:12px;padding:10px 12px;}
  .saldo-pill .pill-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
  .saldo-pill .pill-val{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.1;}
  .saldo-pill.ahorros .pill-val{color:var(--green);}
  .saldo-pill.deudas .pill-val{color:var(--red);}
  .saldo-pill.neto .pill-val{color:var(--amber);}
  .progress-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;text-align:right;}

  /* TABS */
  .tabs{display:flex;gap:0;margin:20px 24px 0;background:var(--surface2);border-radius:12px;padding:3px;}
  .tab{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px;border-radius:9px;cursor:pointer;transition:all 0.2s;}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}

  /* TIPOS GRID */
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:20px 24px 10px;}
  .tipos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 24px;}
  .tipo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .tipo-dot{width:8px;height:8px;border-radius:50%;margin-bottom:10px;}
  .tipo-name{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .tipo-usd{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.1;}
  .tipo-ars{font-size:12px;color:var(--muted);margin-top:3px;}

  /* HISTORIAL */
  .historial{padding:0 24px;}
  .entry{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
  .entry:last-child{border-bottom:none;}
  .entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .entry-info{flex:1;min-width:0;}
  .entry-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .entry-amounts{text-align:right;flex-shrink:0;}
  .entry-usd{font-size:14px;font-weight:600;}
  .entry-ars{font-size:11px;color:var(--muted);margin-top:1px;}
  .entry-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;flex-shrink:0;}
  .badge-pendiente{background:var(--red-dim);color:var(--red);}
  .badge-pagada{background:var(--green-dim);color:var(--green);}

  /* FAB */
  .fab-area{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
  .fab{background:var(--green);color:#0f0f0e;border:none;border-radius:50px;padding:14px 24px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 8px 32px rgba(126,203,161,0.25);transition:all 0.2s;white-space:nowrap;}
  .fab.deuda{background:var(--red);box-shadow:0 8px 32px rgba(203,126,126,0.25);}
  .fab:active{transform:scale(0.96);}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .overlay.open{display:flex;}
  .sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px 44px;width:100%;max-width:430px;animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);max-height:90vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px;}
  .sheet h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:7px;}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:var(--green);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
  .chip.active{color:var(--text);border-color:currentColor;}
  .chip .chip-dot{width:7px;height:7px;border-radius:50%;}
  .save-btn{width:100%;background:var(--green);color:#0f0f0e;border:none;border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
  .save-btn.red{background:var(--red);}
  .save-btn:disabled{opacity:0.4;}
  .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--green);color:var(--green);font-size:13px;padding:10px 20px;border-radius:20px;z-index:200;transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.error{border-color:var(--red);color:var(--red);}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:32px 0;}
  .loading-state{text-align:center;color:var(--muted);font-size:13px;padding:24px 0;}
  .hidden{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Mis <em>finanzas</em></h1>
    <button class="sync-btn" onclick="loadAll()"><span class="spin">↻</span> Sync</button>
  </div>
  <div class="persona-toggle">
    <button class="persona-btn manuel active" onclick="setPersona('Manuel')">Manuel</button>
    <button class="persona-btn flor" onclick="setPersona('Flor')">Flor</button>
  </div>
  <p class="subtitle" style="margin-top:10px" id="last-sync">Conectando...</p>
</div>

<!-- SALDO NETO -->
<div class="saldo-card">
  <div class="saldo-label">Resumen</div>
  <div class="saldo-grid">
    <div class="saldo-pill ahorros">
      <div class="pill-label">Ahorros</div>
      <div class="pill-val" id="total-ahorros">u$d —</div>
    </div>
    <div class="saldo-pill deudas">
      <div class="pill-label">Deudas</div>
      <div class="pill-val" id="total-deudas">u$d —</div>
    </div>
    <div class="saldo-pill neto">
      <div class="pill-label">Neto</div>
      <div class="pill-val" id="total-neto">u$d —</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">Objetivo u$d 10.000 · 0%</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setTab('ahorros')">🟢 Ahorros</button>
  <button class="tab" onclick="setTab('deudas')">🔴 Deudas</button>
</div>

<!-- AHORROS -->
<div id="panel-ahorros">
  <div class="section-title">Por tipo</div>
  <div class="tipos-grid" id="tipos-grid"><div class="loading-state" style="grid-column:1/-1">Cargando...</div></div>
  <div class="section-title">Movimientos</div>
  <div class="historial" id="historial-ahorros"><div class="loading-state">Cargando...</div></div>
</div>

<!-- DEUDAS -->
<div id="panel-deudas" class="hidden">
  <div class="section-title">Deudas pendientes</div>
  <div class="historial" id="historial-deudas"><div class="loading-state">Cargando...</div></div>
</div>

<!-- FABs -->
<div class="fab-area">
  <button class="fab" id="fab-ahorro" onclick="openModal('ahorro')"><span>+</span> Ahorro</button>
  <button class="fab deuda" id="fab-deuda" onclick="openModal('deuda')"><span>+</span> Deuda</button>
</div>

<!-- MODAL AHORRO -->
<div class="overlay" id="overlay-ahorro" onclick="closeIfOutside(event,'ahorro')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Nuevo ahorro</h2>
    <div class="field"><label>Descripción</label><input type="text" id="a-desc" placeholder="Ej: Dólares junio"/></div>
    <div class="field"><label>Monto</label><input type="number" id="a-monto" placeholder="0" inputmode="decimal"/></div>
    <div class="field">
      <label>Moneda</label>
      <div class="chips" id="chips-a-moneda">
        <div class="chip active" data-val="ARS" onclick="selectChip(this,'a-moneda')" style="color:var(--amber)"><span class="chip-dot" style="background:var(--amber)"></span>ARS</div>
        <div class="chip" data-val="USD" onclick="selectChip(this,'a-moneda')"><span class="chip-dot" style="background:var(--green)"></span>USD</div>
      </div>
    </div>
    <div class="field">
      <label>Tipo</label>
      <div class="chips" id="chips-a-tipo">
        <div class="chip" data-val="Dólares físicos" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--green)"></span>Dólares</div>
        <div class="chip" data-val="Balanz" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--blue)"></span>Balanz</div>
        <div class="chip" data-val="Cripto" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--amber)"></span>Cripto</div>
        <div class="chip" data-val="Marquez obra" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--brown)"></span>Marquez</div>
        <div class="chip" data-val="Plazo fijo" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--pink)"></span>Plazo fijo</div>
        <div class="chip" data-val="Otros" onclick="selectChip(this,'a-tipo')"><span class="chip-dot" style="background:var(--muted)"></span>Otros</div>
      </div>
    </div>
    <button class="save-btn" id="btn-save-ahorro" onclick="saveAhorro()">Guardar ahorro</button>
  </div>
</div>

<!-- MODAL DEUDA -->
<div class="overlay" id="overlay-deuda" onclick="closeIfOutside(event,'deuda')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Nueva deuda</h2>
    <div class="field"><label>Descripción</label><input type="text" id="d-desc" placeholder="Ej: Le debo a Juan viaje"/></div>
    <div class="field"><label>A quién le debés</label><input type="text" id="d-aquien" placeholder="Nombre"/></div>
    <div class="field"><label>Monto</label><input type="number" id="d-monto" placeholder="0" inputmode="decimal"/></div>
    <div class="field">
      <label>Moneda</label>
      <div class="chips" id="chips-d-moneda">
        <div class="chip active" data-val="ARS" onclick="selectChip(this,'d-moneda')" style="color:var(--amber)"><span class="chip-dot" style="background:var(--amber)"></span>ARS</div>
        <div class="chip" data-val="USD" onclick="selectChip(this,'d-moneda')"><span class="chip-dot" style="background:var(--green)"></span>USD</div>
      </div>
    </div>
    <button class="save-btn red" id="btn-save-deuda" onclick="saveDeuda()">Guardar deuda</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://notion-proxy.msagarraga.workers.dev';
const DB_AHORROS = '0921211d-2e59-41be-b276-1c3869ed0e9e';
const DB_DEUDAS  = 'b340f231-848b-475b-96fe-45cbec8cad7f';

const TIPO_COLORS = {'Dólares físicos':'var(--green)','Balanz':'var(--blue)','Cripto':'var(--amber)','Marquez obra':'var(--brown)','Plazo fijo':'var(--pink)','Otros':'var(--muted)'};
const TIPO_DIM   = {'Dólares físicos':'var(--green-dim)','Balanz':'var(--blue-dim)','Cripto':'var(--amber-dim)','Marquez obra':'var(--brown-dim)','Plazo fijo':'var(--pink-dim)','Otros':'rgba(138,136,128,0.1)'};

let state = {
  persona: 'Manuel',
  tab: 'ahorros',
  ahorros: [],
  deudas: [],
  cotizacion: 1150,
  cotizacionTipo: 'est.',
  chips: { 'a-moneda':'ARS', 'a-tipo':null, 'd-moneda':'ARS' }
};

async function notionReq(path, method='GET', body=null) {
  const res = await fetch(WORKER_URL, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({path, method, body})
  });
  if (!res.ok) throw new Error('Worker ' + res.status);
  return res.json();
}

function parseAhorro(p) {
  const pr = p.properties;
  const g = (k,t) => {
    if(!pr[k]) return null;
    if(t==='title') return pr[k].title?.[0]?.plain_text||'';
    if(t==='number') return pr[k].number||0;
    if(t==='select') return pr[k].select?.name||null;
    if(t==='checkbox') return pr[k].checkbox||false;
    if(t==='date') return pr[k].date?.start||null;
  };
  return {id:p.id, desc:g('Descripción','title')||'Sin desc', montoARS:g('Monto ARS','number')||0, montoUSD:g('Monto USD','number')||0, tipo:g('Tipo','select')||'Otros', persona:g('Persona','select')||'Manuel', mes:g('Mes','select')||'', año:g('Año','select')||'', fecha:g('Fecha','date')||new Date().toISOString().split('T')[0], confirmado:g('Confirmado','checkbox')};
}

function parseDeuda(p) {
  const pr = p.properties;
  const g = (k,t) => {
    if(!pr[k]) return null;
    if(t==='title') return pr[k].title?.[0]?.plain_text||'';
    if(t==='number') return pr[k].number||0;
    if(t==='select') return pr[k].select?.name||null;
    if(t==='text') return pr[k].rich_text?.[0]?.plain_text||'';
    if(t==='date') return pr[k].date?.start||null;
  };
  return {id:p.id, desc:g('Descripción','title')||'Sin desc', montoARS:g('Monto ARS','number')||0, montoUSD:g('Monto USD','number')||0, aquien:g('A quién','text')||'', persona:g('Persona','select')||'Manuel', mes:g('Mes','select')||'', año:g('Año','select')||'', fecha:g('Fecha','date')||new Date().toISOString().split('T')[0], estado:g('Estado','select')||'Pendiente'};
}

async function fetchCotizacion() {
  try {
    const r = await fetch('https://dolarapi.com/v1/dolares/blue');
    const d = await r.json();
    state.cotizacion = d.venta||d.compra||1150;
    state.cotizacionTipo = 'Blue';
  } catch { state.cotizacion=1150; state.cotizacionTipo='est.'; }
}

async function loadAll() {
  const btn = document.querySelector('.sync-btn');
  btn.classList.add('loading');
  document.getElementById('last-sync').textContent = 'Sincronizando...';
  try {
    const [ra, rd] = await Promise.all([
      notionReq(`/v1/databases/${DB_AHORROS}/query`,'POST',{sorts:[{property:'Fecha',direction:'descending'}]}),
      notionReq(`/v1/databases/${DB_DEUDAS}/query`,'POST',{sorts:[{property:'Fecha',direction:'descending'}]}),
      fetchCotizacion()
    ]);
    state.ahorros = (ra.results||[]).map(parseAhorro);
    state.deudas  = (rd.results||[]).map(parseDeuda);
    const now = new Date();
    document.getElementById('last-sync').textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} · ${state.cotizacionTipo} $${Math.round(state.cotizacion).toLocaleString('es-AR')}`;
    renderAll();
  } catch(e) {
    document.getElementById('last-sync').textContent = 'Error al sincronizar';
    showToast('No se pudo conectar', true);
  } finally { btn.classList.remove('loading'); }
}

function renderAll() { renderSaldo(); renderTipos(); renderAhorros(); renderDeudas(); }

function renderSaldo() {
  const cotiz = state.cotizacion||1150;
  const ahorros = state.ahorros.filter(a=>a.persona===state.persona);
  const deudas  = state.deudas.filter(d=>d.persona===state.persona && d.estado==='Pendiente');
  let totalAhorroUSD=0, totalDeudaUSD=0;
  ahorros.forEach(a=>{ totalAhorroUSD+=a.montoUSD||0; totalAhorroUSD+=(a.montoARS||0)/cotiz; });
  deudas.forEach(d=>{ totalDeudaUSD+=d.montoUSD||0; totalDeudaUSD+=(d.montoARS||0)/cotiz; });
  const neto = totalAhorroUSD - totalDeudaUSD;
  const pct = Math.min(100,(totalAhorroUSD/10000)*100);
  const fmt = v=>'u$d '+Math.round(v).toLocaleString('es-AR');
  document.getElementById('total-ahorros').textContent = fmt(totalAhorroUSD);
  document.getElementById('total-deudas').textContent  = fmt(totalDeudaUSD);
  document.getElementById('total-neto').textContent    = fmt(neto);
  document.getElementById('total-neto').style.color    = neto>=0?'var(--amber)':'var(--red)';
  document.getElementById('progress-fill').style.width = pct.toFixed(1)+'%';
  document.getElementById('progress-label').textContent = `Objetivo u$d 10.000 · ${pct.toFixed(1)}%`;
}

function renderTipos() {
  const cotiz = state.cotizacion||1150;
  const tipos = ['Dólares físicos','Balanz','Cripto','Marquez obra','Plazo fijo','Otros'];
  const usd={}, ars={};
  tipos.forEach(t=>{usd[t]=0;ars[t]=0;});
  state.ahorros.filter(a=>a.persona===state.persona).forEach(a=>{
    const t=a.tipo||'Otros'; usd[t]+=(a.montoUSD||0); ars[t]+=(a.montoARS||0);
  });
  document.getElementById('tipos-grid').innerHTML = tipos.map(t=>`
    <div class="tipo-card" style="background:${TIPO_DIM[t]};border-color:${TIPO_COLORS[t]}33">
      <div class="tipo-dot" style="background:${TIPO_COLORS[t]}"></div>
      <div class="tipo-name">${t}</div>
      ${usd[t]>0?`<div class="tipo-usd" style="color:${TIPO_COLORS[t]}">u$d ${Math.round(usd[t]).toLocaleString('es-AR')}</div>`:''}
      ${ars[t]>0?`<div class="tipo-ars">$ ${Math.round(ars[t]).toLocaleString('es-AR')}</div>`:''}
      ${usd[t]===0&&ars[t]===0?`<div class="tipo-usd" style="color:var(--muted)">—</div>`:''}
    </div>`).join('');
}

function renderAhorros() {
  const sorted = state.ahorros.filter(a=>a.persona===state.persona).slice(0,20);
  if(!sorted.length){document.getElementById('historial-ahorros').innerHTML='<div class="empty">Sin ahorros registrados</div>';return;}
  document.getElementById('historial-ahorros').innerHTML = sorted.map(a=>{
    const color=TIPO_COLORS[a.tipo]||'var(--muted)';
    return `<div class="entry">
      <div class="entry-dot" style="background:${color}"></div>
      <div class="entry-info">
        <div class="entry-desc">${a.desc}</div>
        <div class="entry-meta">${a.tipo} · ${a.mes} ${a.año}</div>
      </div>
      <div class="entry-amounts">
        ${a.montoUSD>0?`<div class="entry-usd" style="color:var(--green)">u$d ${Math.round(a.montoUSD).toLocaleString('es-AR')}</div>`:''}
        ${a.montoARS>0?`<div class="entry-ars">$ ${Math.round(a.montoARS).toLocaleString('es-AR')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderDeudas() {
  const sorted = state.deudas.filter(d=>d.persona===state.persona).slice(0,20);
  if(!sorted.length){document.getElementById('historial-deudas').innerHTML='<div class="empty">Sin deudas registradas</div>';return;}
  document.getElementById('historial-deudas').innerHTML = sorted.map(d=>{
    const isPend = d.estado==='Pendiente';
    return `<div class="entry">
      <div class="entry-dot" style="background:${isPend?'var(--red)':'var(--green)'}"></div>
      <div class="entry-info">
        <div class="entry-desc">${d.desc}</div>
        <div class="entry-meta">A ${d.aquien||'?'} · ${d.mes} ${d.año}</div>
      </div>
      <div class="entry-amounts">
        ${d.montoUSD>0?`<div class="entry-usd" style="color:${isPend?'var(--red)':'var(--muted)'}">u$d ${Math.round(d.montoUSD).toLocaleString('es-AR')}</div>`:''}
        ${d.montoARS>0?`<div class="entry-ars">$ ${Math.round(d.montoARS).toLocaleString('es-AR')}</div>`:''}
      </div>
      <span class="entry-badge ${isPend?'badge-pendiente':'badge-pagada'}">${d.estado}</span>
    </div>`;
  }).join('');
}

function setPersona(p) {
  state.persona = p;
  document.querySelectorAll('.persona-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.persona-btn.${p.toLowerCase()}`).classList.add('active');
  renderAll();
}

function setTab(t) {
  state.tab = t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-ahorros').classList.toggle('hidden', t!=='ahorros');
  document.getElementById('panel-deudas').classList.toggle('hidden', t!=='deudas');
}

function openModal(type) { document.getElementById('overlay-'+type).classList.add('open'); }
function closeModal(type) {
  document.getElementById('overlay-'+type).classList.remove('open');
  if(type==='ahorro'){document.getElementById('a-desc').value='';document.getElementById('a-monto').value='';state.chips['a-tipo']=null;document.querySelectorAll('#chips-a-tipo .chip').forEach(c=>c.classList.remove('active'));}
  if(type==='deuda'){document.getElementById('d-desc').value='';document.getElementById('d-aquien').value='';document.getElementById('d-monto').value='';}
}
function closeIfOutside(e,type){if(e.target===document.getElementById('overlay-'+type))closeModal(type);}

function selectChip(el,group){
  document.getElementById('chips-'+group).querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); state.chips[group]=el.dataset.val;
}

function getMes(){return ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][new Date().getMonth()];}
function getAño(){return String(new Date().getFullYear());}

async function saveAhorro(){
  const desc=document.getElementById('a-desc').value.trim();
  const monto=parseFloat(document.getElementById('a-monto').value);
  if(!desc||!monto||!state.chips['a-tipo']){showToast('Completá descripción, monto y tipo',true);return;}
  const btn=document.getElementById('btn-save-ahorro');
  btn.disabled=true; btn.textContent='Guardando...';
  const esUSD=state.chips['a-moneda']==='USD';
  const hoy=new Date().toISOString().split('T')[0];
  try {
    await notionReq('/v1/pages','POST',{
      parent:{database_id:DB_AHORROS},
      properties:{
        'Descripción':{title:[{text:{content:desc}}]},
        'Monto ARS':{number:esUSD?0:monto},
        'Monto USD':{number:esUSD?monto:0},
        'Tipo':{select:{name:state.chips['a-tipo']}},
        'Persona':{select:{name:state.persona}},
        'Mes':{select:{name:getMes()}},
        'Año':{select:{name:getAño()}},
        'Confirmado':{checkbox:true},
        'Fecha':{date:{start:hoy}}
      }
    });
    state.ahorros.unshift({id:Math.random().toString(36).slice(2),desc,montoARS:esUSD?0:monto,montoUSD:esUSD?monto:0,tipo:state.chips['a-tipo'],persona:state.persona,mes:getMes(),año:getAño(),fecha:hoy,confirmado:true});
    renderAll(); closeModal('ahorro'); showToast('✓ Ahorro guardado');
  } catch { showToast('Error al guardar',true); }
  finally { btn.disabled=false; btn.textContent='Guardar ahorro'; }
}

async function saveDeuda(){
  const desc=document.getElementById('d-desc').value.trim();
  const aquien=document.getElementById('d-aquien').value.trim();
  const monto=parseFloat(document.getElementById('d-monto').value);
  if(!desc||!monto||!aquien){showToast('Completá todos los campos',true);return;}
  const btn=document.getElementById('btn-save-deuda');
  btn.disabled=true; btn.textContent='Guardando...';
  const esUSD=state.chips['d-moneda']==='USD';
  const hoy=new Date().toISOString().split('T')[0];
  try {
    await notionReq('/v1/pages','POST',{
      parent:{database_id:DB_DEUDAS},
      properties:{
        'Descripción':{title:[{text:{content:desc}}]},
        'A quién':{rich_text:[{text:{content:aquien}}]},
        'Monto ARS':{number:esUSD?0:monto},
        'Monto USD':{number:esUSD?monto:0},
        'Persona':{select:{name:state.persona}},
        'Mes':{select:{name:getMes()}},
        'Año':{select:{name:getAño()}},
        'Estado':{select:{name:'Pendiente'}},
        'Fecha':{date:{start:hoy}}
      }
    });
    state.deudas.unshift({id:Math.random().toString(36).slice(2),desc,aquien,montoARS:esUSD?0:monto,montoUSD:esUSD?monto:0,persona:state.persona,mes:getMes(),año:getAño(),fecha:hoy,estado:'Pendiente'});
    renderAll(); closeModal('deuda'); showToast('✓ Deuda guardada');
  } catch { showToast('Error al guardar',true); }
  finally { btn.disabled=false; btn.textContent='Guardar deuda'; }
}

function showToast(msg,error=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(error?' error':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

Promise.all([loadAll(), fetchCotizacion()]).then(()=>renderAll());
</script>
